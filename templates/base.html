<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Roll Inventory" }}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-text">
          <div class="brand-title">Roll Inventory</div>
          <div class="brand-sub">Fast scan workflow</div>
        </div>
      </div>

      <div class="topbar-actions">
        {% if session.get("logged_in") %}
          <button type="button" class="btn ghost" id="fullscreenBtn">Full Screen</button>
          <a class="btn ghost" href="{{ url_for('home') }}">Home</a>
          <a class="btn ghost" href="{{ url_for('logout') }}">Logout</a>
        {% endif %}
      </div>
    </div>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrap">
          {% for cat, msg in messages %}
            <div class="flash {{ cat }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>

  <script>
    (function () {
      const btn = document.getElementById("fullscreenBtn");
      if (!btn) return;

      function updateText() {
        btn.textContent = document.fullscreenElement ? "Exit Full Screen" : "Full Screen";
      }

      btn.addEventListener("click", async () => {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (e) {}
        updateText();
      });

      document.addEventListener("fullscreenchange", updateText);
      updateText();
    })();
  </script>
</body>
</html>
