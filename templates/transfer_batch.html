{% extends "base.html" %}

{% block content %}
<div class="card">
  <h2>Batch Transfer</h2>

  <form method="post" action="{{ url_for('transfer_batch_form') }}">
    <div class="form-row">
      <label for="from_wh">From Warehouse</label>
      <select name="from_wh" id="from_wh" required>
        <option value="">Select source warehouse</option>
        {% for wh in warehouses %}
          <option value="{{ wh }}">{{ warehouse_label(wh) }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-row">
      <label for="to_wh">To Warehouse</label>
      <select name="to_wh" id="to_wh" required onchange="updateLocations()">
        <option value="">Select destination warehouse</option>
        {% for wh in warehouses %}
          <option value="{{ wh }}">{{ warehouse_label(wh) }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-row">
      <label for="location">Destination Row</label>
      <select name="location" id="location" required>
        <option value="">Select destination row</option>
      </select>
    </div>

    <div class="form-row">
      <label for="roll_ids">Roll IDs</label>
      <textarea
        name="roll_ids"
        id="roll_ids"
        rows="12"
        placeholder="Paste or scan one Roll ID per line"
        required
      ></textarea>
    </div>

    <div class="form-row">
      <button type="submit" class="btn">Transfer Rolls</button>
      <a href="{{ url_for('home') }}" class="btn">Back</a>
    </div>
  </form>
</div>

<script>
  const wh1Locations = {{ wh1_locations | tojson }};
  const wh2Locations = {{ wh2_locations | tojson }};

  function updateLocations() {
    const wh = document.getElementById("to_wh").value;
    const locationSelect = document.getElementById("location");

    locationSelect.innerHTML = '<option value="">Select destination row</option>';

    let locations = [];
    if (wh === "WH1") {
      locations = wh1Locations;
    } else if (wh === "WH2") {
      locations = wh2Locations;
    }

    locations.forEach(loc => {
      const option = document.createElement("option");
      option.value = loc;
      option.textContent = loc;
      locationSelect.appendChild(option);
    });
  }
</script>
{% endblock %}
