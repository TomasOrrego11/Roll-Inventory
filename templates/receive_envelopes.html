{% extends "base.html" %}
{% set title = "Receive Envelopes" %}
{% block content %}

<div class="section-block">
  <div class="card">
    <div class="panel-head">
      <div>
        <div class="section-kicker">ENVELOPE INVENTORY</div>
        <h3>Receive Pallets</h3>
        <div class="hint" style="margin-top:8px;">
          Add received pallets to an envelope type. If it does not exist yet, it will be created.
        </div>
      </div>

      <div class="panel-actions">
        <a class="btn ghost" href="{{ url_for('envelopes_home') }}">Back</a>
      </div>
    </div>
  </div>
</div>

<div class="section-block">
  <div class="card">
    <form method="POST" class="form-grid">
      <div class="form-group">
        <label>Envelope Type</label>
        <input type="text" name="envelope_type" placeholder="e.g. C/FSC" required>
      </div>

      <div class="form-group">
        <label>Quantity Received</label>
        <input type="number" name="quantity" placeholder="e.g. 8" min="1" required>
      </div>

      <div style="margin-top:16px;">
        <button class="btn primary" type="submit">Receive</button>
        <a class="btn ghost" href="{{ url_for('envelopes_home') }}">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
