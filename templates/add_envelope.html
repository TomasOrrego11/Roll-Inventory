{% extends "base.html" %}
{% set title = "Add / Update Envelope" %}
{% block content %}

<div class="section-block">
  <div class="card">
    <div class="panel-head">
      <div>
        <div class="section-kicker">ENVELOPE INVENTORY</div>
        <h3>Add / Update Envelope</h3>
        <div class="hint" style="margin-top:8px;">
          Enter the envelope type and total number of pallets. If it already exists, it will be updated.
        </div>
      </div>

      <div class="panel-actions">
        <a class="btn ghost" href="{{ url_for('envelopes_home') }}">Back</a>
      </div>
    </div>
  </div>
</div>

<div class="section-block">
  <div class="card">
    <form method="POST" class="form-grid">

      <div class="form-group">
        <label>Envelope Type</label>
        <input type="text" name="envelope_type" placeholder="e.g. #10 Window, 9x12 White" required>
      </div>

      <div class="form-group">
        <label>Pallet Count</label>
        <input type="number" name="pallet_count" placeholder="e.g. 10" min="0" required>
      </div>

      <div style="margin-top:16px;">
        <button class="btn primary" type="submit">Save</button>
        <a class="btn ghost" href="{{ url_for('envelopes_home') }}">Cancel</a>
      </div>

    </form>
  </div>
</div>

{% endblock %}
