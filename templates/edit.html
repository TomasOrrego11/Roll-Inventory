{% extends "base.html" %}
{% set title = "Edit / Move Roll" %}
{% block content %}

<div class="section-block">
  <div class="card">
    <div class="panel-head">
      <div>
        <div class="section-kicker">ROLL CONTROL</div>
        <h3>Edit / Move — {{ r.roll_id }}</h3>
        <div class="hint" style="margin-top:8px;">
          Enter moves to the next field and the final field can be submitted quickly in scanner workflow.
        </div>
      </div>

      <div class="panel-actions">
        <a class="btn ghost" href="{{ url_for('inventory', warehouse=r.warehouse) }}">Back to {{ r.warehouse }}</a>
      </div>
    </div>

    <form method="post" autocomplete="off" data-page="edit" style="margin-top:14px;">
      <div class="grid2">
        <div>
          <label>Paper Type</label>
          <input name="paper_type" value="{{ r.paper_type }}" required>
        </div>

        <div>
          <label>Weight (lbs)</label>
          <input name="weight" value="{{ r.weight }}" inputmode="numeric" required>
        </div>

        <div>
          <label>Warehouse</label>
          <select name="warehouse" id="warehouse" required>
            {% for w in warehouses %}
              <option value="{{ w }}" {% if r.warehouse == w %}selected{% endif %}>{{ w }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label>Sublocation</label>
          <select name="location" id="location" required></select>
        </div>
      </div>

      <div class="form-actions" style="margin-top:16px;">
        <button class="btn primary" type="submit">Save Changes</button>
      </div>
    </form>

    <hr style="margin:22px 0;">

    <div class="row-actions">
      <form method="post" action="{{ url_for('delete_roll_pc', roll_id=r.roll_id) }}"
            onsubmit="return confirm('Move to USED?');" style="margin:0;">
        <button class="btn" type="submit">→ USED</button>
      </form>

      <form method="post"
            action="{{ url_for('delete_roll_pc', roll_id=r.roll_id) }}"
            onsubmit="return confirm('DELETE this roll permanently? This cannot be undone.');"
            style="margin:0;">
        <button class="btn danger" type="submit">DELETE THIS ROLL</button>
      </form>
    </div>
  </div>
</div>

<script>
const wh1 = {{ locations_for('WH1')|tojson }};
const wh2 = {{ locations_for('WH2')|tojson }};
const used = ["USED"];

const currentWH = "{{ r.warehouse }}";
const currentLoc = "{{ r.location }}";

const whEl = document.getElementById("warehouse");
const locEl = document.getElementById("location");

function fillLocations(wh, selected){
  locEl.innerHTML = "";

  let list = [];
  if(wh === "WH1") list = wh1;
  else if(wh === "WH2") list = wh2;
  else list = used;

  list.forEach(v=>{
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(v === selected) opt.selected = true;
    locEl.appendChild(opt);
  });

  if(!locEl.value && list.length) locEl.value = list[0];
}

whEl.addEventListener("change", ()=>{
  const wh = whEl.value;
  fillLocations(wh, (wh === currentWH ? currentLoc : null));
});

fillLocations(currentWH, currentLoc);
</script>

{% endblock %}
