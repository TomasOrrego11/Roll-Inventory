{% extends "base.html" %}
{% set title = "Transfer / Move Roll" %}
{% block content %}

<div class="section-block">
  <div class="card">
    <div class="section-head">
      <div>
        <div class="section-kicker">INTERNAL MOVEMENT</div>
        <h2 class="section-title">Transfer / Move Roll</h2>
        <p class="hint" style="margin-top:10px;">
          You can transfer rolls between warehouses or move them to another sub-location inside the same warehouse.
        </p>
      </div>
    </div>

    <form method="POST" id="transferForm" style="margin-top:14px;">
      <div class="grid2">
        <div>
          <label>From Warehouse</label>
          <select name="from_wh" id="from_wh" required>
            {% for w in warehouses %}
              <option value="{{ w }}" {% if w == from_wh %}selected{% endif %}>{{ w }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label>To Warehouse</label>
          <select name="to_wh" id="to_wh" required>
            {% for w in warehouses %}
              <option value="{{ w }}" {% if w == to_wh %}selected{% endif %}>{{ w }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label>Destination Sub-Location</label>
          <select name="location" id="location" required></select>
        </div>

        <div>
          <label>Roll ID (scan)</label>
          <input type="text" name="roll_id" id="roll_id" required autocomplete="off">
        </div>
      </div>

      <div class="form-actions" style="margin-top:16px;">
        <button class="btn primary" type="submit">Move / Transfer</button>
        <a class="btn ghost" href="{{ url_for('home') }}">Back</a>
      </div>
    </form>
  </div>
</div>

<script>
  const wh1 = {{ locations_for('WH1')|tojson }};
  const wh2 = {{ locations_for('WH2')|tojson }};

  const fromWhEl = document.getElementById("from_wh");
  const toWhEl = document.getElementById("to_wh");
  const locEl = document.getElementById("location");
  const formEl = document.getElementById("transferForm");
  const rollEl = document.getElementById("roll_id");

  function fillLocations(wh) {
    locEl.innerHTML = "";
    let list = [];

    if (wh === "WH1") list = wh1;
    if (wh === "WH2") list = wh2;

    list.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      locEl.appendChild(opt);
    });
  }

  toWhEl.addEventListener("change", () => {
    fillLocations(toWhEl.value);
    setTimeout(() => rollEl.focus(), 50);
  });

  formEl.addEventListener("submit", () => {
    const fromWh = fromWhEl.value;
    const toWh = toWhEl.value;
    formEl.action = `/transfer/${fromWh}/${toWh}`;
  });

  fillLocations(toWhEl.value);
</script>

{% endblock %}
