{% extends "base.html" %}
{% set title = "Edit Envelope Name" %}
{% block content %}

<div class="section-block">
  <div class="card">
    <div class="panel-head">
      <div>
        <div class="section-kicker">ENVELOPE INVENTORY</div>
        <h3>Edit Envelope Name</h3>
        <div class="hint" style="margin-top:8px;">
          Rename an existing envelope type if it was entered incorrectly.
        </div>
      </div>

      <div class="panel-actions">
        <a class="btn ghost" href="{{ url_for('envelopes_home') }}">Back</a>
      </div>
    </div>
  </div>
</div>

<div class="section-block">
  <div class="card">
    <form method="POST" class="form-grid">
      <div class="form-group">
        <label>Current Envelope Type</label>
        <input type="text" name="old_name" placeholder="e.g. C/FSC" required>
      </div>

      <div class="form-group">
        <label>New Envelope Type</label>
        <input type="text" name="new_name" placeholder="e.g. C/FSC WHITE" required>
      </div>

      <div style="margin-top:16px;">
        <button class="btn primary" type="submit">Save New Name</button>
        <a class="btn ghost" href="{{ url_for('envelopes_home') }}">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
