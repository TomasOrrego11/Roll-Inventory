{% extends "base.html" %}
{% set title = "Remove Roll → " ~ warehouse_label("USED") %}
{% block content %}

<div class="section-block">
  <div class="card">
    <div class="section-head">
      <div>
        <div class="section-kicker">IN USE WORKFLOW</div>
        <h2 class="section-title">Remove Roll → {{ warehouse_label("USED") }}</h2>
        <p class="hint" style="margin-top:10px;">
          Scan or enter one Roll ID to move it into {{ warehouse_label("USED") }}.
        </p>
      </div>
    </div>

    <form method="POST" action="{{ url_for('remove_form') }}" style="margin-top:14px;">
      <label>Scan / Enter Roll ID</label>
      <input type="text" name="roll_id" id="roll_id" required autocomplete="off">

      <div class="form-actions" style="margin-top:16px;">
        <button class="btn primary" type="submit">
          Move to {{ warehouse_label("USED") }}
        </button>
        <a class="btn ghost" href="{{ url_for('home') }}">Back</a>
      </div>
    </form>
  </div>
</div>

<script>
  window.addEventListener("load", () => {
    const el = document.getElementById("roll_id");
    if (el) el.focus();
  });
</script>

{% endblock %}
